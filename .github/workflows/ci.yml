name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.x"
      - name: Install git-annex on Linux
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y git-annex
      - name: Install git-annex on macOS
        if: runner.os == 'macOS'
        run: brew install git-annex
      - run: go test ./...
      - run: go build ./cmd/dfs
